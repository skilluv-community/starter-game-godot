name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: GDScript syntax check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4.3
        run: |
          curl -sSL -o godot.zip https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q godot.zip
          mv Godot_v4.3-stable_linux.x86_64 godot
          chmod +x godot
      - name: Check that the project opens
        run: ./godot --headless --path . --quit-after 1
